<div class="min-h-screen bg-hp-dark flex items-center justify-center p-4">

  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_#1a1a35_0%,_#09090f_70%)]"></div>
    <div class="absolute top-1/4 left-1/3 w-1 h-1 bg-hp-gold rounded-full opacity-60 animate-pulse"></div>
    <div class="absolute top-1/3 right-1/4 w-1 h-1 bg-white rounded-full opacity-40 animate-pulse" style="animation-delay:.8s"></div>
    <div class="absolute bottom-1/3 left-1/5 w-1 h-1 bg-hp-gold rounded-full opacity-50 animate-pulse" style="animation-delay:1.4s"></div>
  </div>

  <div class="relative w-full max-w-md animate-slide-up">
    <div class="hp-card p-5 shadow-2xl shadow-black/50">

      <div class="text-center mb-4">
        <div class="w-9 h-9 mx-auto mb-2 text-hp-gold">
          <lucide-icon name="zap" class="w-9 h-9"></lucide-icon>
        </div>
        <h1 class="text-xl font-heading text-hp-gold tracking-wider">Create Account</h1>
        <p class="text-hp-muted text-sm mt-0.5">Join the magical world</p>
      </div>

      @if (error()) {
        <div class="mb-3 px-4 py-2.5 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm animate-fade-in">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-2">

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Name</label>
            <input
              type="text"
              formControlName="name"
              placeholder="Harry Potter"
              class="hp-input"
              autocomplete="name"
            />
            <p class="error-msg" [class.invisible]="!(name.invalid && name.touched)">Minimum 2 characters.</p>
          </div>

          <div>
            <label class="block text-sm text-gray-400 mb-1">Date of birth</label>
            <input
              type="date"
              formControlName="birthdate"
              class="hp-input"
              [max]="today"
            />
            <p class="error-msg" [class.invisible]="!(birthdate.invalid && birthdate.touched)">Select your birthdate.</p>
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="harry@hogwarts.com"
            class="hp-input"
            autocomplete="email"
          />
          <p class="error-msg" [class.invisible]="!(email.invalid && email.touched)">Please enter a valid email.</p>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Password</label>
          <div class="relative">
            <input
              [type]="showPwd() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Minimum 8 characters"
              class="hp-input pr-10"
              autocomplete="new-password"
            />
            <button
              type="button"
              (click)="showPwd.set(!showPwd())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-hp-muted hover:text-gray-300 transition-colors"
            >
              <lucide-icon [name]="showPwd() ? 'eye-off' : 'eye'" class="w-5 h-5"></lucide-icon>
            </button>
          </div>
          <p class="error-msg" [class.invisible]="!(password.invalid && password.touched)">Minimum 8 characters.</p>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Confirm password</label>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="Repeat your password"
            class="hp-input"
            autocomplete="new-password"
          />
          <p class="error-msg" [class.invisible]="!mismatch">Passwords do not match.</p>
        </div>

        <button type="submit" [disabled]="loading()" class="hp-btn-primary mt-1">
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <span class="w-4 h-4 border-2 border-hp-dark/30 border-t-hp-dark rounded-full animate-spin"></span>
              Creating account...
            </span>
          } @else {
            Request admission to Hogwarts
          }
        </button>

      </form>

      <p class="text-center text-hp-muted text-sm mt-3">
        Already have an account?
        <a routerLink="/auth/login" class="hp-btn-ghost ml-1">Sign in</a>
      </p>

    </div>

    <div class="mt-4 text-center flex items-center justify-center gap-3">
      <lucide-icon name="star" class="w-3 h-3 text-hp-border"></lucide-icon>
      <p class="text-hp-border text-xs font-heading tracking-widest">DRACO DORMIENS NUNQUAM TITILLANDUS</p>
      <lucide-icon name="star" class="w-3 h-3 text-hp-border"></lucide-icon>
    </div>
  </div>
</div>
